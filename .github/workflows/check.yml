name: Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Unit tests
        run: bun test

      - name: Palette is in sync with generator
        # If anyone edits palette/generate.ts without regenerating palette.json
        # (or vice versa), this step fails the PR.
        run: |
          bun palette/generate.ts
          git diff --exit-code palette/palette.json

      - name: All ports are in sync with templates + palette
        # `prism --check` re-renders every port and diffs against the
        # committed dist/ files. Drift = fail.
        run: bun compiler/prism.ts --all --check
