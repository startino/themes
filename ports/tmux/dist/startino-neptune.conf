# vim:set ft=tmux:

# --> Startino (Neptune)
# Generated by prism. Do not edit by hand.
set -ogq @thm_bg "#171919"
set -ogq @thm_fg "#e2e5e5"

# Accent colors
set -ogq @thm_rosewater "#ffdcdb"
set -ogq @thm_flamingo  "#ffc7c8"
set -ogq @thm_pink      "#ffbfda"
set -ogq @thm_mauve     "#cea2ff"
set -ogq @thm_red       "#ff8496"
set -ogq @thm_maroon    "#f797b5"
set -ogq @thm_peach     "#ffb084"
set -ogq @thm_yellow    "#ffe292"
set -ogq @thm_green     "#45dfa4"
set -ogq @thm_teal      "#79e5e5"
set -ogq @thm_sky       "#79def6"
set -ogq @thm_sapphire  "#64c7fd"
set -ogq @thm_blue      "#7db6ff"
set -ogq @thm_lavender  "#b7bdff"

# Surfaces and overlays
set -ogq @thm_subtext_1 "#c2c5c5"
set -ogq @thm_subtext_0 "#a7aaaa"
set -ogq @thm_overlay_2 "#898c8c"
set -ogq @thm_overlay_1 "#707272"
set -ogq @thm_overlay_0 "#585a5a"
set -ogq @thm_surface_2 "#454747"
set -ogq @thm_surface_1 "#363838"
set -ogq @thm_surface_0 "#282a2a"
set -ogq @thm_mantle    "#111313"
set -ogq @thm_crust     "#0c0e0e"

# Brand aliases — primary is mint (green), no accent rotation
set -ogq @thm_primary   "#45dfa4"
set -ogq @thm_secondary "#ffbfda"

# Status line
set -g status "on"
set -g status-bg "#{@thm_bg}"
set -g status-fg "#{@thm_fg}"
set -g status-left-length 100
set -g status-right-length 100

# Pane borders
set -g pane-border-style "fg=#{@thm_surface_1}"
set -g pane-active-border-style "fg=#{@thm_primary}"

# Message styling
set -g message-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"
set -g message-command-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"

# Status line content
set -g status-left "#[fg=#{@thm_bg},bg=#{@thm_primary},bold] #S #[fg=#{@thm_primary},bg=#{@thm_surface_0}]#[fg=#{@thm_fg},bg=#{@thm_surface_0}] #H #[fg=#{@thm_surface_0},bg=#{@thm_bg}]"
set -g status-right "#[fg=#{@thm_surface_0},bg=#{@thm_bg}]#[fg=#{@thm_fg},bg=#{@thm_surface_0}] %Y-%m-%d #[fg=#{@thm_primary},bg=#{@thm_surface_0}]#[fg=#{@thm_bg},bg=#{@thm_primary},bold] %H:%M "

# Window list
set -g window-status-format "#[fg=#{@thm_fg},bg=#{@thm_surface_0}] #I #W "
set -g window-status-current-format "#[fg=#{@thm_bg},bg=#{@thm_primary},bold] #I #W "
set -g window-status-separator ""
set -g window-status-style "fg=#{@thm_fg},bg=#{@thm_surface_0}"
set -g window-status-current-style "fg=#{@thm_bg},bg=#{@thm_primary},bold"

# Mode style (copy mode etc.)
set -g mode-style "fg=#{@thm_bg},bg=#{@thm_yellow}"
