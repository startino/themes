# Startino Themes — Jupiter ♃
# Generated by prism. Do not edit by hand.
#
# Hyprland color variables. Source this file BEFORE any config that
# references the variables, e.g. in your top-level user config:
#
#   source = ~/.config/hypr/shared/colors/startino-jupiter.conf
#   source = ~/.config/hypr/shared/themes/default/**.conf
#
# Then in your border / decoration / misc blocks:
#
#   col.active_border = $startino_active_border_a $startino_active_border_b 45deg
#   col.inactive_border = $startino_inactive_border
#   col.shadow = $startino_shadow
#
# Hyprland color syntax: rgba(RRGGBBAA), rgb(RRGGBB), or 0xAARRGGBB.

# Brand pair — used for the active-window border gradient (mint → pink).
$startino_brand_primary    = rgba(51e8acff)
$startino_brand_secondary  = rgba(ffbad7ff)
$startino_active_border_a  = $startino_brand_primary
$startino_active_border_b  = $startino_brand_secondary

# Surface palette.
$startino_inactive_border  = rgba(4e6a6bff)
$startino_background       = rgba(142b2bff)
$startino_shadow           = rgba(0d1e1eff)

# Group/tab borders (when using grouped windows).
$startino_group_active     = $startino_brand_primary
$startino_group_inactive   = rgba(2f4a4aff)
$startino_group_locked     = rgba(ff788eff)
